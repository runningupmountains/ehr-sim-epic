<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — EHR Simulator</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>EHRSim Admin</h1>
    <p class="sub">Internal simulator console</p>
    <div class="login-warning">⚠ Internal EHR Simulator — Fake Data Only</div>

    {% if error %}
      <div class="flash flash-error" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="form-group" style="margin-bottom:16px">
        <label for="key">Admin Key</label>
        <input id="key" type="password" name="key" placeholder="Enter admin key" autofocus required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
